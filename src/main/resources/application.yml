spring:
  threads:
    virtual:
      enabled: true

# Each entry builds one RestClient + one Resilience4j retry instance (instance name == key).
external:
  dependencies:
    step1-api:
      base-url: https://api1.example.com
      connect-timeout: 2s
      read-timeout: 5s
      connection-request-timeout: 2s
      max-connections: 20
      # ssl-bundle: partner-api-tls
      default-headers:
        Accept: application/json
      retry:
        max-attempts: 4
        initial-backoff: 500ms
        backoff-multiplier: 2.0
    step2-api:
      base-url: https://api2.example.com
      retry:
        max-attempts: 4
    step3-api:
      base-url: https://api3.example.com
      retry:
        max-attempts: 4
    step4-api:
      base-url: https://api4.example.com
      retry:
        max-attempts: 4

logging:
  level:
    com.example.resilience: DEBUG
